version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: xchores
      POSTGRES_USER: xchores
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xchores_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xchores"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://xchores:${POSTGRES_PASSWORD:-xchores_dev}@db:5432/xchores
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NODE_ENV: production

  # Run migrations on deploy (one-shot container)
  migrate:
    build:
      context: ./app
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://xchores:${POSTGRES_PASSWORD:-xchores_dev}@db:5432/xchores
    command: npx prisma migrate deploy
    restart: "no"

volumes:
  pgdata:
